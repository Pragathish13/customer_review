<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Poppins; background:#f4f6f9; }

/* Sidebar */
.sidebar {
    position: fixed;
    width: 250px;
    height: 100%;
    background: #1e293b;
    color: white;
    padding: 20px;
    overflow-y: auto;
}

.sidebar h5 { margin-top:20px; }

.menu-item {
    display:block;
    padding:10px;
    border-radius:8px;
    color:white;
    text-decoration:none;
    margin-bottom:5px;
}
.menu-item:hover { background:#334155; }

/* Profile */
.profile {
    position:absolute;
    bottom:80px;
    width:80%;
    text-align:center;
}
.profile img {
    width:60px;
    border-radius:50%;
}

/* Logout */
.logout {
    position:absolute;
    bottom:20px;
    width:80%;
}
.logout a {
    display:block;
    background:#ef4444;
    padding:10px;
    text-align:center;
    border-radius:8px;
    color:white;
    text-decoration:none;
}

/* Main */
.main {
    margin-left:270px;
    padding:20px;
}
canvas { max-height:300px; }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <h4>📊 Admin Panel</h4>

    <!-- Dashboard -->
    <a href="/admin/dashboard" class="menu-item">Dashboard</a>

    <!-- Dataset -->
    <h5>Datasets</h5>
    <a href="/admin/dashboard" class="menu-item">All</a>

    {% for p in product_labels %}
    <a href="/admin/dashboard?product={{ p }}&chart={{ chart_type }}" class="menu-item">
        {{ p }}
    </a>
    {% endfor %}

    <!-- Chart Types -->
    <h5>Charts</h5>
    <a href="/admin/dashboard?product={{ selected_product }}&chart=pie" class="menu-item">Pie Chart</a>
    <a href="/admin/dashboard?product={{ selected_product }}&chart=bar" class="menu-item">Bar Chart</a>
    <a href="/admin/dashboard?product={{ selected_product }}&chart=line" class="menu-item">Line Chart</a>

    <!-- Profile -->
    <div class="profile">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <p>Admin</p>
    </div>

    <!-- Logout -->
    <div class="logout">
        <a href="/logout">Logout</a>
    </div>

</div>

<!-- Main -->
<div class="main">

<h3>
{% if selected_product %}
Dataset: {{ selected_product }}
{% else %}
All Datasets
{% endif %}
</h3>

<canvas id="chart"></canvas>

</div>

<script>
const data = [{{ positive }}, {{ negative }}, {{ neutral }}];
const labels = ['Positive','Negative','Neutral'];

const chartType = "{{ chart_type }}";

new Chart(document.getElementById("chart"), {
    type: chartType,
    data: {
        labels: labels,
        datasets: [{
            label: "Sentiment",
            data: data,
            backgroundColor: ['#22c55e','#ef4444','#facc15']
        }]
    }
});
</script>

</body>
</html>
